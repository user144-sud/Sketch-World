<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sketch-Skate</title>
    <style>
        :root {
            --cursor-img: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><path d="M2,2 L18,12 L12,14 L18,24 L14,26 L8,16 L4,20 Z" fill="white" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>');
        }
        body {
            margin: 0; background-color: #f0f0f0; font-family: 'Courier New', Courier, monospace;
            display: flex; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden; cursor: var(--cursor-img) 2 2, auto; user-select: none;
        }
        #game-wrapper { position: relative; border: 5px solid #000; background: white; box-shadow: 15px 15px 0px #000; }
        canvas { display: block; background-color: #fff; max-width: 100vw; max-height: 80vh; }
        
        .ui-panel { position: absolute; top: 15px; left: 15px; display: none; flex-direction: column; gap: 8px; z-index: 5; }
        button { background: #fff; border: 3px solid #000; padding: 10px 15px; font-weight: bold; font-family: inherit; cursor: var(--cursor-img) 2 2, pointer; transition: 0.1s; }
        button:hover { background: #000; color: #fff; }

        .menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 5px solid #000; padding: 20px; text-align: center; z-index: 10; min-width: 300px; box-shadow: 10px 10px 0px #000; }
        
        #mobile-controls { position: absolute; bottom: 30px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: none; }
        .m-btn { width: 65px; height: 65px; background: white; border: 4px solid #000; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
        
        .level-info { position: absolute; top: 15px; right: 15px; font-weight: bold; font-size: 1.2em; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="levelLabel" class="level-info"></div>

    <div id="startMenu" class="menu">
        <h1 style="margin:0; letter-spacing: 2px;">SKETCH-SKATE</h1>
        <p>Dynamic Sketch Physics Platformer</p>
        <button onclick="startGame()" style="font-size: 1.5em; width: 100%;">START GAME</button>
    </div>

    <div id="gameUI" class="ui-panel">
        <button onclick="toggleMapMode()">WORLD MAP</button>
        <button onclick="toggleMenu('settingsMenu')">SETTINGS</button>
    </div>

    <div id="settingsMenu" class="menu" style="display:none;">
        <h2>Settings</h2>
        <button onclick="toggleMobile()" id="mobToggle">Mobile Controls: OFF</button>
        <br><br><button onclick="toggleMenu('settingsMenu')">CLOSE</button>
    </div>

    <div id="mobile-controls">
        <div style="display:flex; gap: 15px;">
            <div class="m-btn" id="btnL">←</div>
            <div class="m-btn" id="btnR">→</div>
        </div>
        <div class="m-btn" id="btnJ">JUMP</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 450;

    const GRAVITY = 0.6;
    const JUMP_FORCE = -12;
    const BASE_SPEED = 4.5;
    const MAX_SPEED = 10;
    const ACCEL = 0.15;

    let gameActive = false, isMapMode = false, unlockedLevels = [1], currentLevel = 0, activeMenu = null, mobileOn = false;

    const player = { 
        x: 400, y: 410, velX: 0, velY: 0, grounded: false, 
        direction: 1, isDead: false, 
        isWinning: false, rotation: 0, scale: 1,
        skateRotation: 0, currentMaxSpeed: BASE_SPEED 
    };

    // World Map Nodes
    const mapNodes = [
        { id: 1, x: 80, y: 380, next: [2] }, { id: 2, x: 180, y: 380, next: [3] },
        { id: 3, x: 280, y: 340, next: [4] }, { id: 4, x: 380, y: 310, next: [5, 7] },
        { id: 5, x: 320, y: 220, next: [6] }, { id: 6, x: 220, y: 180, next: [9] },
        { id: 7, x: 440, y: 220, next: [8] }, { id: 8, x: 540, y: 180, next: [10] },
        { id: 9, x: 320, y: 110, next: [11] }, { id: 10, x: 440, y: 110, next: [11] },
        { id: 11, x: 380, y: 50, next: [12] }, { id: 12, x: 500, y: 40, next: [13] },
        { id: 13, x: 620, y: 100, next: [14] }, { id: 14, x: 700, y: 180, next: [15] },
        { id: 15, x: 720, y: 280, next: [16] }, { id: 16, x: 720, y: 400, next: [] }
    ];

    const mapDecor = [
        { type: 'mtn', x: 20, y: 410, w: 60 }, { type: 'mtn', x: 200, y: 410, w: 40 },
        { type: 'mtn', x: 500, y: 410, w: 80 }, { type: 'plat', x: 120, y: 320, w: 30 }
    ];

    const mapPlayer = { x: mapNodes[0].x, y: mapNodes[0].y, targetNode: 0 };
    let platforms = [], spikes = [], ramps = [], keyhole = null;

    const keys = {};
    const mobKeys = { l: false, r: false, j: false };
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function bindMob(id, key) {
        const b = document.getElementById(id);
        const set = (v) => (e) => { e.preventDefault(); mobKeys[key] = v; };
        b.addEventListener('touchstart', set(true)); b.addEventListener('touchend', set(false));
    }
    bindMob('btnL', 'l'); bindMob('btnR', 'r'); bindMob('btnJ', 'j');

    function startGame() {
        document.getElementById('startMenu').style.display = 'none';
        document.getElementById('gameUI').style.display = 'flex';
        gameActive = true;
        isMapMode = true; 
    }

    function toggleMapMode() { isMapMode = !isMapMode; if (activeMenu) toggleMenu(activeMenu); }
    function toggleMobile() { 
        mobileOn = !mobileOn; 
        document.getElementById('mobile-controls').style.display = mobileOn ? 'flex' : 'none';
        document.getElementById('mobToggle').innerText = "Mobile Controls: " + (mobileOn ? "ON" : "OFF");
    }
    
    function enterLevel(id) { 
        currentLevel = id; 
        isMapMode = false; 
        loadLevel(id); 
    }

    function loadLevel(id) {
        platforms = []; spikes = []; ramps = []; 
        keyhole = { x: 750, y: 380 };
        player.x = 50; player.y = 350; player.velX = 0; player.velY = 0;
        player.currentMaxSpeed = BASE_SPEED; player.isDead = false; player.isWinning = false;
        player.rotation = 0; player.scale = 1;
        document.getElementById('levelLabel').innerText = "LEVEL " + id;

        const floorY = 410;

        switch(id) {
            case 1: // Tutorial
                platforms = [{x: 0, y: floorY, w: 800, h: 40}];
                break;
            case 2: // The Gap
                platforms = [{x: 0, y: floorY, w: 300, h: 40}, {x: 450, y: floorY, w: 350, h: 40}];
                break;
            case 3: // Steps
                platforms = [{x: 0, y: floorY, w: 250, h: 40}, {x: 350, y: 320, w: 200, h: 20}, {x: 650, y: floorY, w: 150, h: 40}];
                break;
            case 4: // First Ramp
                platforms = [{x: 0, y: floorY, w: 250, h: 40}, {x: 550, y: 300, w: 250, h: 40}];
                ramps = [{x: 250, y: floorY, w: 300, h: 110, dir: 1}];
                keyhole.y = 270;
                break;
            case 5: // Spike Introduction
                platforms = [{x: 0, y: floorY, w: 200, h: 40}, {x: 300, y: floorY, w: 200, h: 40}, {x: 600, y: floorY, w: 200, h: 40}];
                spikes = [{x: 230, y: floorY, w: 35, h: 40}, {x: 530, y: floorY, w: 35, h: 40}];
                break;
            case 6: // Precision
                platforms = [{x: 0, y: floorY, w: 100, h: 40}, {x: 200, y: 350, w: 80, h: 20}, {x: 350, y: 290, w: 80, h: 20}, {x: 500, y: 230, w: 80, h: 20}, {x: 650, y: floorY, w: 150, h: 40}];
                break;
            case 7: // High Jump
                platforms = [{x: 0, y: floorY, w: 200, h: 40}, {x: 650, y: 150, w: 150, h: 20}];
                ramps = [{x: 200, y: floorY, w: 200, h: 150, dir: 1}];
                spikes = [{x: 450, y: floorY, w: 40, h: 40}];
                keyhole.y = 120;
                break;
            case 8: // Steep Hill
                platforms = [{x: 0, y: 150, w: 150, h: 20}, {x: 550, y: floorY, w: 250, h: 40}];
                ramps = [{x: 150, y: floorY, w: 400, h: 260, dir: 0}];
                player.y = 100;
                break;
            case 9: // The Pit
                platforms = [{x: 0, y: floorY, w: 300, h: 40}, {x: 500, y: floorY, w: 300, h: 40}];
                spikes = [{x: 350, y: floorY, w: 30, h: 40}, {x: 400, y: floorY, w: 30, h: 40}, {x: 450, y: floorY, w: 30, h: 40}];
                break;
            case 10: // Long Hall
                platforms = [{x: 0, y: floorY, w: 800, h: 40}];
                for(let i=150; i<700; i+=120) spikes.push({x: i, y: floorY, w: 30, h: 45});
                break;
            case 11: // Mountain Peak
                platforms = [{x: 0, y: floorY, w: 100, h: 40}, {x: 350, y: 250, w: 100, h: 20}, {x: 700, y: 100, w: 100, h: 20}];
                ramps = [{x: 100, y: floorY, w: 250, h: 160, dir: 1}, {x: 450, y: 250, w: 250, h: 150, dir: 1}];
                keyhole.y = 70;
                break;
            case 12: // Floating Gaps
                for(let i=0; i<4; i++) platforms.push({x: i*200, y: floorY - (i*40), w: 100, h: 20});
                spikes = [{x: 150, y: floorY, w: 40, h: 40}, {x: 350, y: floorY, w: 40, h: 40}];
                break;
            case 13: // Half-Pipe
                platforms = [{x: 0, y: floorY, w: 100, h: 40}, {x: 700, y: floorY, w: 100, h: 40}];
                ramps = [{x: 100, y: floorY, w: 200, h: 180, dir: 0}, {x: 400, y: floorY, w: 200, h: 180, dir: 1}];
                keyhole.x = 400; keyhole.y = 380;
                break;
            case 14: // Bumpers
                platforms = [{x: 0, y: floorY, w: 800, h: 40}];
                ramps = [{x: 200, y: floorY, w: 60, h: 60, dir: 1}, {x: 260, y: floorY, w: 60, h: 60, dir: 0}];
                spikes = [{x: 450, y: floorY, w: 30, h: 30}, {x: 550, y: floorY, w: 30, h: 30}];
                break;
            case 15: // Tower
                platforms = [{x: 0, y: floorY, w: 100, h: 40}];
                for(let i=1; i<6; i++) platforms.push({x: 100 + i*100, y: floorY - i*60, w: 80, h: 20});
                keyhole.x = 650; keyhole.y = 100;
                break;
            case 16: // Final Gauntlet
                platforms = [{x: 0, y: floorY, w: 150, h: 40}, {x: 400, y: 250, w: 100, h: 20}, {x: 700, y: 150, w: 100, h: 20}];
                ramps = [{x: 150, y: floorY, w: 200, h: 100, dir: 1}];
                spikes = [{x: 380, y: floorY, w: 30, h: 40}, {x: 450, y: floorY, w: 30, h: 40}, {x: 550, y: floorY, w: 30, h: 40}];
                keyhole.y = 120;
                break;
        }
    }

    function toggleMenu(id) {
        const m = document.getElementById(id);
        if (activeMenu === id) { m.style.display = 'none'; activeMenu = null; }
        else { if (activeMenu) document.getElementById(activeMenu).style.display = 'none'; m.style.display = 'block'; activeMenu = id; }
    }

    // DRAWING LOGIC
    function drawSketchRect(x, y, w, h) {
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.strokeRect(x, y, w, h);
        ctx.beginPath(); for (let i = 8; i < w; i += 12) { ctx.moveTo(x + i, y); ctx.lineTo(x + i - 8, y + h); } ctx.stroke();
    }

    function drawSketchRamp(r) {
        ctx.save(); ctx.beginPath();
        if(r.dir === 1) { ctx.moveTo(r.x, r.y); ctx.lineTo(r.x + r.w, r.y - r.h); ctx.lineTo(r.x + r.w, r.y); }
        else { ctx.moveTo(r.x, r.y); ctx.lineTo(r.x, r.y - r.h); ctx.lineTo(r.x + r.w, r.y); }
        ctx.closePath(); ctx.stroke(); ctx.clip(); ctx.beginPath();
        for (let i = -r.h; i < r.w + r.h; i += 12) { ctx.moveTo(r.x + i, r.y - r.h); ctx.lineTo(r.x + i - 15, r.y + r.h + 20); } ctx.stroke(); ctx.restore();
    }

    function drawSketchSpike(s) {
        ctx.save();
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(s.x, s.y); 
        ctx.lineTo(s.x + s.w / 2, s.y - s.h); 
        ctx.lineTo(s.x + s.w, s.y);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }

    function drawKeyhole(x, y) {
        ctx.save(); ctx.translate(x, y); ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(0, -12, 14, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(-8, -10); ctx.lineTo(8, -10); ctx.lineTo(15, 20); ctx.lineTo(-15, 20); ctx.closePath(); ctx.fill(); ctx.restore();
    }

    function drawStickman(p, mapStyle = false) {
        ctx.save(); ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation || 0); ctx.scale(p.scale || 1, p.scale || 1);
        const sc = mapStyle ? 0.6 : 1;
        const headR = 10 * sc, headY = -55 * sc; 
        ctx.strokeStyle = '#000'; ctx.lineWidth = 3 * sc; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(0, headY, headR, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, headY + headR); ctx.lineTo(0, -20 * sc); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, headY + 15 * sc); ctx.lineTo(-15 * sc, headY + 35 * sc);
        ctx.moveTo(0, headY + 15 * sc); ctx.lineTo(15 * sc, headY + 35 * sc);
        ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -20 * sc); ctx.lineTo(-10 * sc, 2 * sc);
        ctx.moveTo(0, -20 * sc); ctx.lineTo(10 * sc, 2 * sc);
        ctx.stroke();
        if (!mapStyle) {
            ctx.save(); ctx.rotate(p.skateRotation); 
            ctx.lineWidth = 3; ctx.beginPath();
            ctx.moveTo(-20, 2); ctx.quadraticCurveTo(-26, 2, -30, 0);
            ctx.moveTo(20, 2); ctx.quadraticCurveTo(26, 2, 30, 0);
            ctx.moveTo(-20, 2); ctx.lineTo(20, 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(-15, 7, 4, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.arc(15, 7, 4, 0, Math.PI*2); ctx.stroke();
            ctx.restore();
        }
        ctx.restore();
    }

    function update() {
        if (!gameActive) { requestAnimationFrame(update); return; }
        if (isMapMode) {
            const target = mapNodes[mapPlayer.targetNode];
            const dx = target.x - mapPlayer.x, dy = target.y - mapPlayer.y;
            const d = Math.sqrt(dx*dx + dy*dy);
            if (d > 5) { mapPlayer.x += (dx/d)*5; mapPlayer.y += (dy/d)*5; }
        } else {
            if (player.isDead) {
                player.velY += GRAVITY; player.y += player.velY; player.rotation += 0.3;
                if (player.y > canvas.height + 150) loadLevel(currentLevel);
                draw(); requestAnimationFrame(update); return;
            }
            if (!player.isWinning) {
                if (keys['ArrowRight'] || keys['KeyD'] || mobKeys.r) { 
                    player.currentMaxSpeed = Math.min(player.currentMaxSpeed + ACCEL, MAX_SPEED);
                    player.velX = player.currentMaxSpeed; 
                } else if (keys['ArrowLeft'] || keys['KeyA'] || mobKeys.l) { 
                    player.currentMaxSpeed = Math.min(player.currentMaxSpeed + ACCEL, MAX_SPEED);
                    player.velX = -player.currentMaxSpeed; 
                } else { player.velX *= 0.85; player.currentMaxSpeed = BASE_SPEED; }
                if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || mobKeys.j) && player.grounded) { 
                    player.velY = JUMP_FORCE; player.grounded = false; 
                }
                player.skateRotation = !player.grounded ? player.skateRotation + 0.2 : 0;
                if (keyhole) {
                    if (Math.sqrt((keyhole.x - player.x)**2 + (keyhole.y - player.y)**2) < 40) {
                        player.isWinning = true;
                        if(!unlockedLevels.includes(currentLevel + 1) && currentLevel < 16) unlockedLevels.push(currentLevel + 1);
                    }
                }
            }
            if (player.isWinning) {
                player.scale *= 0.92; player.rotation += 0.2;
                if (player.scale < 0.1) isMapMode = true;
            } else {
                player.velY += GRAVITY; player.x += player.velX; player.y += player.velY;
                let onObject = false; let targetRot = 0;
                platforms.forEach(p => {
                    if (player.x + 15 > p.x && player.x - 15 < p.x + p.w && player.y >= p.y - 11 && player.y <= p.y + 15 && player.velY >= 0) {
                        player.y = p.y - 11; player.velY = 0; player.grounded = true; onObject = true;
                    }
                });
                ramps.forEach(r => {
                    if (player.x >= r.x && player.x <= r.x + r.w) {
                        let relX = player.x - r.x;
                        let hAtX = (r.dir === 1) ? (relX / r.w) * r.h : (1 - (relX / r.w)) * r.h;
                        let surfY = r.y - hAtX;
                        if (player.y >= surfY - 20 && player.y <= surfY + 20 && player.velY >= -2) {
                            player.y = surfY - 11; player.velY = 0; player.grounded = true; onObject = true;
                            let angle = Math.atan(r.h / r.w); targetRot = (r.dir === 1) ? -angle : angle;
                        }
                    }
                });
                player.rotation += (targetRot - player.rotation) * 0.2;
                if(!onObject) player.grounded = false;
                spikes.forEach(s => { 
                    if (player.x + 10 > s.x && player.x - 10 < s.x + s.w && player.y > s.y - s.h && player.y - 50 < s.y) {
                        player.isDead = true; player.velY = -10;
                    }
                });
                if (player.y > canvas.height + 50) { player.isDead = true; player.velY = -5; }
            }
        }
        draw(); requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!gameActive) return;
        if (isMapMode) {
            document.getElementById('levelLabel').innerText = "WORLD MAP";
            mapDecor.forEach(d => {
                ctx.beginPath(); ctx.strokeStyle = "#ddd"; ctx.lineWidth = 2;
                if(d.type === 'mtn') { ctx.moveTo(d.x, d.y); ctx.lineTo(d.x+d.w/2, d.y-d.w); ctx.lineTo(d.x+d.w, d.y); }
                else if(d.type === 'plat') { ctx.strokeRect(d.x, d.y, d.w, 5); }
                ctx.stroke();
            });
            mapNodes.forEach(n => {
                n.next.forEach(nxtId => {
                    const nxt = mapNodes.find(x => x.id === nxtId);
                    ctx.strokeStyle = unlockedLevels.includes(nxt.id) ? "#000" : "#ccc"; 
                    ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(nxt.x, nxt.y); ctx.stroke();
                });
                ctx.fillStyle = unlockedLevels.includes(n.id) ? "#fff" : "#eee";
                ctx.strokeStyle = unlockedLevels.includes(n.id) ? "#000" : "#ccc";
                ctx.beginPath(); ctx.arc(n.x, n.y, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = unlockedLevels.includes(n.id) ? "#000" : "#ccc";
                ctx.textAlign = "center"; ctx.font = "bold 12px Arial"; ctx.fillText(n.id, n.x, n.y+5);
            });
            drawStickman({ x: mapPlayer.x, y: mapPlayer.y }, true);
        } else {
            platforms.forEach(p => drawSketchRect(p.x, p.y, p.w, p.h));
            ramps.forEach(r => drawSketchRamp(r));
            spikes.forEach(s => drawSketchSpike(s));
            if (keyhole) drawKeyhole(keyhole.x, keyhole.y);
            drawStickman(player);
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        if (!isMapMode) return;
        const rect = canvas.getBoundingClientRect();
        const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const my = (e.clientY - rect.top) * (canvas.height / rect.height);
        mapNodes.forEach((node, idx) => {
            if (Math.sqrt((mx-node.x)**2 + (my-node.y)**2) < 20 && unlockedLevels.includes(node.id)) {
                if (mapPlayer.targetNode === idx) enterLevel(node.id);
                else mapPlayer.targetNode = idx;
            }
        });
    });
    update();
</script>
</body>
</html>
