<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sketch-World: Delta Quest</title>
    <style>
        :root {
            --cursor-img: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><path d="M2,2 L18,12 L12,14 L18,24 L14,26 L8,16 L4,20 Z" fill="white" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>');
        }

        body {
            margin: 0; background-color: #fff; font-family: 'Courier New', Courier, monospace;
            display: flex; align-items: center; justify-content: center; height: 100vh;
            overflow: hidden; cursor: var(--cursor-img) 2 2, auto; user-select: none;
        }

        #game-wrapper { position: relative; border: 5px solid #000; background: white; box-shadow: 15px 15px 0px #000; }
        canvas { display: block; background-color: #fff; max-width: 100vw; max-height: 80vh; }

        .ui-panel { position: absolute; top: 15px; left: 15px; display: none; flex-direction: column; gap: 8px; z-index: 5; }
        button { background: #fff; border: 3px solid #000; padding: 10px 15px; font-weight: bold; font-family: inherit; cursor: var(--cursor-img) 2 2, pointer; }
        button:hover { background: #000; color: #fff; }

        .menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 5px solid #000; padding: 20px; text-align: center; z-index: 10; min-width: 300px; }
        
        #mobile-controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; }
        .m-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.8); border: 3px solid #000; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; border-radius: 5px; }
        
        #levelNotify { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; pointer-events: none; }
        #hud { position: absolute; top: 15px; right: 20px; text-align: right; font-weight: bold; }
        #lives-container { display: flex; gap: 4px; justify-content: flex-end; margin-bottom: 5px; }
        .heart { width: 20px; height: 20px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
    <div id="levelNotify"></div>
    
    <div id="hud">
        <div id="lives-container"></div>
        <div id="scoreText">Δ: 0</div>
    </div>

    <div id="startMenu" class="menu">
        <h1 style="margin:0">SKETCH-WORLD</h1>
        <p>7 LEVELS • 5 LIVES<br>Reach the keyhole to advance!</p>
        <button onclick="startGame()" style="font-size: 1.5em; width: 100%;">START GAME</button>
    </div>

    <div id="gameOverMenu" class="menu" style="display:none;">
        <h1 style="color:red;">GAME OVER</h1>
        <p>You ran out of lives.</p>
        <button onclick="restartFromBeginning()" style="width: 100%;">RESTART GAME</button>
    </div>

    <div id="victoryMenu" class="menu" style="display:none;">
        <h2 id="winTitle">LEVEL COMPLETE!</h2>
        <button id="nextBtn" onclick="goToNextLevel()" style="width: 100%;">NEXT LEVEL</button>
    </div>

    <div id="gameUI" class="ui-panel">
        <button onclick="toggleMenu('settingsMenu')">SETTINGS</button>
    </div>

    <div id="settingsMenu" class="menu" style="display:none;">
        <h2>Settings</h2>
        <button onclick="toggleMobile()" id="mobToggle">Mobile Buttons: OFF</button>
        <br><br><button onclick="toggleMenu('settingsMenu')">CLOSE</button>
    </div>

    <div id="mobile-controls">
        <div style="display:flex; gap: 10px;">
            <div class="m-btn" id="btnL">←</div>
            <div class="m-btn" id="btnR">→</div>
        </div>
        <div class="m-btn" id="btnJ">JUMP</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 450;

    const GRAVITY = 0.6;
    const JUMP_FORCE = -12.5;
    const SPEED = 5;

    let gameActive = false, mobileOn = false, activeMenu = null;
    let cameraX = 0, currentLevelIndex = 0, score = 0, lives = 5;

    const player = { 
        x: 50, y: 300, velX: 0, velY: 0, grounded: false, 
        direction: 1, checkpointX: 80, checkpointY: 300,
        isDead: false, isWinning: false, rotation: 0, scale: 1 
    };

    let platforms = [], spikes = [], trees = [], coins = [], levelWidth = 3000;
    let keyhole = { x: 0, y: 0 };
    let checkpointFlag = { x: 0, y: 0, active: false };

    const levels = [
        {   // Level 1
            width: 3200, keyhole: { x: 3100, y: 375 }, checkpoint: { x: 1500, y: 410 },
            trees: [{x:200,p:0},{x:1600,p:3}], coins: [{x:600,y:350},{x:1200,y:250}],
            platforms: [{x:0,y:410,w:800,h:40},{x:950,y:330,w:200,h:20},{x:1250,y:260,w:200,h:20},{x:1500,y:410,w:700,h:40},{x:2300,y:320,w:300,h:20},{x:2700,y:410,w:500,h:40}],
            spikes: [{x:500,y:380,w:30,h:30}]
        },
        {   // Level 2: Fixed with stepping platform
            width: 3800, keyhole: { x: 3600, y: 165 }, checkpoint: { x: 1800, y: 410 },
            trees: [{x:100,p:0},{x:1900,p:4}], coins: [{x:800,y:250},{x:1400,y:220}],
            platforms: [
                {x:0,y:410,w:600,h:40},{x:700,y:330,w:150,h:20},{x:950,y:260,w:150,h:20},
                {x:1200,y:330,w:150,h:20},{x:1500,y:410,w:800,h:40},{x:2400,y:330,w:200,h:20},
                {x:2700,y:250,w:200,h:20},{x:3000,y:350,w:200,h:20},{x:3300,y:410,w:400,h:40},
                {x:3500,y:300,w:150,h:20},{x:3550,y:200,w:200,h:20}
            ],
            spikes: [{x:350,y:380,w:40,h:30},{x:1600,y:380,w:60,h:30}]
        },
        {   // Level 3
            width: 3200, keyhole: { x: 3000, y: 375 }, checkpoint: { x: 1500, y: 410 },
            trees: [{x:100,p:0}], coins: [{x:1000,y:150}],
            platforms: [{x:0,y:410,w:600,h:40},{x:700,y:300,w:100,h:20},{x:900,y:200,w:100,h:20},{x:1150,y:300,w:100,h:20},{x:1400,y:410,w:700,h:40},{x:2200,y:320,w:200,h:20},{x:2500,y:410,w:600,h:40}],
            spikes: [{x:1200,y:420,w:200,h:30}]
        },
        {   // Level 4
            width: 3500, keyhole: { x: 3300, y: 375 }, checkpoint: { x: 1700, y: 410 },
            trees: [{x:2000,p:1}], coins: [{x:800,y:300}],
            platforms: [{x:0,y:410,w:1200,h:40},{x:1400,y:410,w:1500,h:40},{x:3100,y:410,w:500,h:40}],
            spikes: [{x:400,y:380,w:30,h:30},{x:700,y:380,w:30,h:30},{x:1000,y:380,w:30,h:30},{x:1500,y:380,w:30,h:30},{x:2000,y:380,w:30,h:30}]
        },
        {   // Level 5
            width: 3800, keyhole: { x: 3600, y: 275 }, checkpoint: { x: 2000, y: 410 },
            trees: [{x:100,p:0}], coins: [{x:1200,y:200}],
            platforms: [{x:0,y:410,w:600,h:40},{x:750,y:320,w:150,h:20},{x:1050,y:240,w:150,h:20},{x:1350,y:320,w:150,h:20},{x:1700,y:410,w:800,h:40},{x:2600,y:300,w:200,h:20},{x:2900,y:410,w:1000,h:40},{x:3500,y:310,w:200,h:20}],
            spikes: [{x:600,y:420,w:150,h:30},{x:2500,y:420,w:400,h:30}]
        },
        {   // Level 6
            width: 3500, keyhole: { x: 3300, y: 375 }, checkpoint: { x: 1800, y: 410 },
            trees: [{x:100,p:0}], coins: [{x:1500,y:300}],
            platforms: [{x:0,y:410,w:600,h:40},{x:800,y:340,w:600,h:20},{x:1600,y:410,w:1000,h:40},{x:2800,y:410,w:700,h:40}],
            spikes: [{x:650,y:420,w:100,h:30},{x:2650,y:420,w:100,h:30}]
        },
        {   // Level 7
            width: 4500, keyhole: { x: 4300, y: 375 }, checkpoint: { x: 2500, y: 410 },
            trees: [{x:100,p:0}], coins: [{x:2000,y:200}],
            platforms: [{x:0,y:410,w:800,h:40},{x:1000,y:300,w:100,h:20},{x:1250,y:200,w:100,h:20},{x:1500,y:300,w:100,h:20},{x:1800,y:410,w:600,h:40},{x:2500,y:410,w:800,h:40},{x:3400,y:320,w:150,h:20},{x:3700,y:240,w:150,h:20},{x:4000,y:410,w:600,h:40}],
            spikes: [{x:850,y:420,w:900,h:30},{x:3400,y:420,w:500,h:30}]
        }
    ];

    const keys = {};
    const mobKeys = { l: false, r: false, j: false };
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function bindMob(id, key) {
        const b = document.getElementById(id);
        const set = (v) => (e) => { e.preventDefault(); mobKeys[key] = v; };
        b.addEventListener('touchstart', set(true), {passive: false}); b.addEventListener('touchend', set(false));
        b.addEventListener('mousedown', set(true)); b.addEventListener('mouseup', set(false));
    }
    bindMob('btnL', 'l'); bindMob('btnR', 'r'); bindMob('btnJ', 'j');

    function updateHearts() {
        const container = document.getElementById('lives-container');
        container.innerHTML = '';
        for(let i=0; i<lives; i++) {
            container.innerHTML += `<svg class="heart" viewBox="0 0 32 32"><path d="M16,28.5L4,16.5c-3-3-3-8.5,1-12.5s9.5-1,11,3c1.5-4,7-7,11-3s4,9.5,1,12.5L16,28.5z" fill="white" stroke="black" stroke-width="2"/></svg>`;
        }
    }

    function startGame() {
        document.getElementById('startMenu').style.display = 'none';
        document.getElementById('gameUI').style.display = 'flex';
        lives = 5; score = 0; currentLevelIndex = 0;
        updateHearts(); updateScore();
        gameActive = true;
        loadLevel(0, true);
    }

    function restartFromBeginning() {
        document.getElementById('gameOverMenu').style.display = 'none';
        startGame();
    }

    function loadLevel(idx, isNewLevel) {
        const lvl = levels[idx];
        if (!lvl) return;
        platforms = lvl.platforms; spikes = lvl.spikes; trees = lvl.trees;
        coins = lvl.coins.map(c => ({...c, collected: false}));
        keyhole = lvl.keyhole; levelWidth = lvl.width;
        checkpointFlag = { x: lvl.checkpoint.x, y: lvl.checkpoint.y, active: false };

        if (isNewLevel) { player.checkpointX = 80; player.checkpointY = 300; }
        player.x = player.checkpointX; player.y = player.checkpointY;
        player.velX = 0; player.velY = 0; player.isDead = false; player.isWinning = false; player.rotation = 0; player.scale = 1;
        cameraX = player.x - canvas.width/2;
        
        document.getElementById('victoryMenu').style.display = 'none';
        document.getElementById('levelNotify').innerText = "LEVEL " + (idx + 1);
        setTimeout(() => { document.getElementById('levelNotify').innerText = ""; }, 2000);
    }

    function handleDeath() {
        lives--;
        updateHearts();
        if (lives <= 0) {
            gameActive = false;
            document.getElementById('gameOverMenu').style.display = 'block';
        } else {
            player.x = player.checkpointX; player.y = player.checkpointY;
            player.velX = 0; player.velY = 0; player.isDead = false; player.rotation = 0;
        }
    }

    function goToNextLevel() {
        currentLevelIndex++;
        if (currentLevelIndex < levels.length) loadLevel(currentLevelIndex, true);
        else { alert("CONGRATULATIONS! YOU CONQUERED SKETCH-WORLD!"); location.reload(); }
    }

    function updateScore() { document.getElementById('scoreText').innerText = "Δ: " + score; }

    function toggleMenu(id) {
        const m = document.getElementById(id);
        if (activeMenu === id) { m.style.display = 'none'; activeMenu = null; }
        else { if (activeMenu) document.getElementById(activeMenu).style.display = 'none'; m.style.display = 'block'; activeMenu = id; }
    }

    function toggleMobile() { 
        mobileOn = !mobileOn; 
        document.getElementById('mobile-controls').style.display = mobileOn ? 'flex' : 'none'; 
        document.getElementById('mobToggle').innerText = "Mobile Buttons: " + (mobileOn ? "ON" : "OFF"); 
    }

    function drawStickman(p) {
        ctx.save();
        ctx.translate(p.x - cameraX, p.y);
        ctx.rotate(p.rotation || 0); ctx.scale(p.scale || 1, p.scale || 1);
        ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(0, -52, 10, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -42); ctx.lineTo(0, -20); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -37); ctx.lineTo(-15 * p.direction, -22);
        ctx.moveTo(0, -37); ctx.lineTo(15 * p.direction, -22); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(-12, 0); ctx.moveTo(0, -20); ctx.lineTo(12, 0); ctx.stroke();
        ctx.restore();
    }

    function drawPine(x, y) {
        ctx.save();
        ctx.translate(x - cameraX, y);
        ctx.strokeStyle = "#000"; ctx.fillStyle = "#fff"; ctx.lineWidth = 2;
        ctx.strokeRect(-5, -12, 10, 12); ctx.fillRect(-5, -12, 10, 12);
        for (let i = 0; i < 3; i++) {
            ctx.beginPath();
            ctx.moveTo(-22 + (i * 4), -12 - (i * 15));
            ctx.lineTo(22 - (i * 4), -12 - (i * 15));
            ctx.lineTo(0, -32 - (i * 15));
            ctx.closePath(); ctx.fill(); ctx.stroke();
        }
        ctx.restore();
    }

    function drawCoin(c) {
        if (c.collected) return;
        ctx.save(); ctx.translate(c.x - cameraX, c.y);
        ctx.strokeStyle = "#000"; ctx.fillStyle = "#fff"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#000"; ctx.font = "bold 11px Arial"; ctx.textAlign = "center";
        ctx.fillText("Δ", 0, 4); ctx.restore();
    }

    function update() {
        if (!gameActive) { requestAnimationFrame(update); return; }

        if (!player.isDead && !player.isWinning) {
            if (keys['ArrowRight'] || keys['KeyD'] || mobKeys.r) { player.velX = SPEED; player.direction = 1; }
            else if (keys['ArrowLeft'] || keys['KeyA'] || mobKeys.l) { player.velX = -SPEED; player.direction = -1; }
            else { player.velX *= 0.8; }

            if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || mobKeys.j) && player.grounded) { 
                player.velY = JUMP_FORCE; player.grounded = false; 
            }

            coins.forEach(c => {
                if (!c.collected && Math.abs(player.x - c.x) < 25 && Math.abs(player.y - 30 - c.y) < 30) {
                    c.collected = true; score++; updateScore();
                }
            });

            if (!checkpointFlag.active && Math.abs(player.x - checkpointFlag.x) < 40 && Math.abs(player.y - checkpointFlag.y) < 60) {
                checkpointFlag.active = true; player.checkpointX = checkpointFlag.x; player.checkpointY = checkpointFlag.y;
            }

            let dx = keyhole.x - player.x, dy = keyhole.y - (player.y - 30);
            if (Math.sqrt(dx*dx + dy*dy) < 60) {
                player.velX += dx * 0.05; player.velY += dy * 0.05;
                if (Math.sqrt(dx*dx + dy*dy) < 15) { 
                    player.isWinning = true;
                    setTimeout(() => { document.getElementById('victoryMenu').style.display = 'block'; }, 500);
                }
            }
        }

        if (player.isWinning) {
            player.rotation += 0.2; player.scale *= 0.92;
            player.x += (keyhole.x - player.x) * 0.2; player.y += (keyhole.y - (player.y - 30)) * 0.2;
        } else {
            player.velY += GRAVITY; player.x += player.velX; player.y += player.velY;
            if (player.isDead) { 
                player.rotation += 0.15; if (player.y > canvas.height + 200) handleDeath(); 
            } else {
                player.grounded = false;
                platforms.forEach(p => {
                    if (player.x + 12 > p.x && player.x - 12 < p.x + p.w && player.y >= p.y && player.y <= p.y + 15 && player.velY >= 0) {
                        player.y = p.y; player.velY = 0; player.grounded = true;
                    }
                });
                spikes.forEach(s => { 
                    if (player.x + 8 > s.x && player.x - 8 < s.x + s.w && player.y > s.y && player.y - 60 < s.y + s.h) { 
                        player.isDead = true; player.velY = -10; 
                    }
                });
                if (player.y > canvas.height + 150) { player.isDead = true; player.velY = 0; }
            }
        }

        let targetCamX = player.x - canvas.width / 2;
        if (targetCamX < 0) targetCamX = 0;
        if (targetCamX > levelWidth - canvas.width) targetCamX = levelWidth - canvas.width;
        cameraX += (targetCamX - cameraX) * 0.1;

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!gameActive) return;

        ctx.save();
        trees.forEach(t => { const p = platforms[t.p]; if(p) drawPine(t.x, p.y); });

        // Checkpoint Flag
        ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(checkpointFlag.x - cameraX, checkpointFlag.y); 
        ctx.lineTo(checkpointFlag.x - cameraX, checkpointFlag.y - 60); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(checkpointFlag.x - cameraX, checkpointFlag.y - 60);
        ctx.lineTo(checkpointFlag.x + 30 - cameraX, checkpointFlag.y - 45);
        ctx.lineTo(checkpointFlag.x - cameraX, checkpointFlag.y - 30);
        if (checkpointFlag.active) { ctx.fillStyle = "#000"; ctx.fill(); }
        ctx.stroke();

        platforms.forEach(p => { 
            ctx.strokeRect(p.x - cameraX, p.y, p.w, p.h); 
            for (let i = 5; i < p.w; i += 20) { 
                ctx.beginPath(); ctx.moveTo(p.x + i - cameraX, p.y); 
                ctx.lineTo(p.x + i + 10 - cameraX, p.y + p.h); ctx.stroke(); 
            } 
        });

        spikes.forEach(s => { 
            ctx.beginPath(); ctx.moveTo(s.x - cameraX, s.y + s.h); 
            ctx.lineTo(s.x + s.w/2 - cameraX, s.y); 
            ctx.lineTo(s.x + s.w - cameraX, s.y + s.h); 
            ctx.closePath(); ctx.stroke(); 
        });

        coins.forEach(drawCoin);

        // Keyhole
        ctx.fillStyle = "#000"; 
        ctx.beginPath(); ctx.arc(keyhole.x - cameraX, keyhole.y - 12, 16, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.moveTo(keyhole.x - 6 - cameraX, keyhole.y - 6); 
        ctx.lineTo(keyhole.x + 6 - cameraX, keyhole.y - 6); 
        ctx.lineTo(keyhole.x + 18 - cameraX, keyhole.y + 25); 
        ctx.lineTo(keyhole.x - 18 - cameraX, keyhole.y + 25); 
        ctx.closePath(); ctx.fill();
        ctx.restore();

        drawStickman(player);
    }
    
    update();
</script>
</body>
</html>
